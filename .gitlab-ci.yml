---
include:
  - project: slxh/pipelines
    file:
      - latex.gitlab-ci.yml

variables:
  PACKAGE: sourceserif

build:
  stage: build
  script:
    - make fonts
    - cp -a $CI_PROJECT_DIR/* /usr/local/texlive/texmf-local
    - echo Map SourceSerifFour.map > /usr/local/texlive/texmf-local/web2c/updmap.cfg
    - texhash
    - updmap-sys
    - make
  artifacts:
    paths:
      - "*.pdf"
      - "*.zip"

test:
  stage: test
  needs: [build]
  image: $CI_REGISTRY/slxh/latex/tools
  script:
    - pdf-diff *-specimen.pdf
